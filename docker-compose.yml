services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: serpiente8
      POSTGRES_DB: nextlms_new
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nextlms_new"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
